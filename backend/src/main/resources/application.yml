spring:
  application:
    name: backend
  config:
    import: optional:file:./backend/.env[.properties],optional:file:./.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: ${MAIL_SSL_ENABLE:true}
      mail.smtp.starttls.enable: ${MAIL_STARTTLS_ENABLE:false}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.personalenglishai.backend.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: ${JWT_SECRET}
  accessTokenSeconds: ${JWT_ACCESS_TOKEN_SECONDS:1800}
  refreshTokenSeconds: ${JWT_REFRESH_TOKEN_SECONDS:259200}

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  cookie:
    secure: ${COOKIE_SECURE:false}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@personalenglishai.com}
  sms:
    enabled: ${SMS_ENABLED:false}

server:
  port: ${SERVER_PORT:18080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  tomcat:
    max-http-form-post-size: 10MB
spring.servlet.multipart.max-file-size: 10MB
spring.servlet.multipart.max-request-size: 10MB

openai:
  client:
    base-url: ${OPENAI_BASE_URL:https://api.openai.com}
    connect-timeout-ms: ${OPENAI_CONNECT_TIMEOUT_MS:5000}
    response-timeout-ms: ${OPENAI_RESPONSE_TIMEOUT_MS:30000}
    overall-timeout-ms: ${OPENAI_OVERALL_TIMEOUT_MS:35000}
    max-retries: ${OPENAI_MAX_RETRIES:2}
    initial-backoff-ms: ${OPENAI_INITIAL_BACKOFF_MS:200}
    max-backoff-ms: ${OPENAI_MAX_BACKOFF_MS:400}
    proxy-enabled: ${OPENAI_PROXY_ENABLED:false}
    proxy-url: ${OPENAI_PROXY_URL:}
    proxy-host: ${OPENAI_PROXY_HOST:}
    proxy-port: ${OPENAI_PROXY_PORT:}
    circuit-breaker:
      failure-threshold: ${OPENAI_CB_FAILURE_THRESHOLD:5}
      window-ms: ${OPENAI_CB_WINDOW_MS:60000}
      recovery-ms: ${OPENAI_CB_RECOVERY_MS:30000}

logging:
  charset:
    console: UTF-8

writing:
  evaluate:
    thread-pool-size: ${WRITING_EVALUATE_THREAD_POOL_SIZE:4}

ai:
  prompt:
    debug: ${AI_PROMPT_DEBUG:false}
    log-raw-enabled: ${AI_PROMPT_LOG_RAW_ENABLED:false}
    log-raw-max-chars: ${AI_PROMPT_LOG_RAW_MAX_CHARS:12000}
    context:
      selected-text-max: ${AI_PROMPT_CONTEXT_SELECTED_TEXT_MAX:1200}
      recent-each-max: ${AI_PROMPT_CONTEXT_RECENT_EACH_MAX:200}
      recent-turns: ${AI_PROMPT_CONTEXT_RECENT_TURNS:8}
      draft-max: ${AI_PROMPT_CONTEXT_DRAFT_MAX:1600}
  context:
    conversation:
      processor: ${AI_CONTEXT_CONVERSATION_PROCESSOR:rule}   # rule | python | hybrid
      python:
        enabled: ${AI_CONTEXT_CONVERSATION_PYTHON_ENABLED:false}
        base-url: ${AI_CONTEXT_CONVERSATION_PYTHON_BASE_URL:http://127.0.0.1:8001}
        timeout-ms: ${AI_CONTEXT_CONVERSATION_PYTHON_TIMEOUT_MS:800}
        fallback-enabled: ${AI_CONTEXT_CONVERSATION_PYTHON_FALLBACK_ENABLED:true}
  repair:
    enabled: ${AI_REPAIR_ENABLED:false}

languagetool:
  enabled: ${LANGUAGETOOL_ENABLED:true}

sapling:
  enabled: ${SAPLING_ENABLED:false}
  api-key: ${SAPLING_API_KEY:}
  base-url: ${SAPLING_BASE_URL:https://api.sapling.ai}
  timeout-ms: ${SAPLING_TIMEOUT_MS:5000}

qwen:
  api-key: ${QWEN_API_KEY:}
  base-url: ${QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
  model: ${QWEN_MODEL:qwen-turbo}
  vl-model: ${QWEN_VL_MODEL:qwen-vl-plus}
  timeout-ms: ${QWEN_TIMEOUT_MS:15000}
