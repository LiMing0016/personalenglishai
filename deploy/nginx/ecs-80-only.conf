# ECS 最小 Nginx 配置：公网仅 80，后端 8080 仅本机
# - GET /health -> http://127.0.0.1:8080/health
# - /api/ -> http://127.0.0.1:8080/api/
# - 其他路径 -> 404（推荐，安全）
#
# 用法：
#   Ubuntu: 放到 /etc/nginx/sites-available/ecs-default，软链到 sites-enabled
#   CentOS: 放到 /etc/nginx/conf.d/ecs-default.conf
#   sudo nginx -t && sudo systemctl reload nginx

upstream backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/ecs-access.log;
    error_log  /var/log/nginx/ecs-error.log;

    client_max_body_size 10M;

    # 健康检查：GET /health -> 后端 /health
    location = /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # API：/api/ -> 后端 /api/
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 其他路径 -> 404（推荐：不暴露未知路径）
    location / {
        return 404;
    }
}

# 若需将其他路径也转发到后端，可把上面 location / 换成：
