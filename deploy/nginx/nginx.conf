# Nginx 反向代理配置
# 将 https://<domain>/api 反代到 http://backend:8080
# 使用方式：
# 1. 将此文件复制到 ECS 的 /etc/nginx/sites-available/personal-english-ai
# 2. 创建软链接：ln -s /etc/nginx/sites-available/personal-english-ai /etc/nginx/sites-enabled/
# 3. 测试配置：nginx -t
# 4. 重载配置：nginx -s reload

upstream backend {
    server backend:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;  # 替换为你的域名，如 api.example.com

    # 日志配置
    access_log /var/log/nginx/personal-english-ai-access.log;
    error_log /var/log/nginx/personal-english-ai-error.log;

    # 客户端请求体大小限制（根据业务需求调整）
    client_max_body_size 10M;

    # API 反向代理
    location /api {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        
        # 请求头设置
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # 健康检查端点（可选，用于监控）
    location /health {
        access_log off;
        proxy_pass http://backend/api/ping;
    }

    # 根路径重定向或返回信息
    location / {
        return 200 'Personal English AI API Gateway\n';
        add_header Content-Type text/plain;
    }
}

